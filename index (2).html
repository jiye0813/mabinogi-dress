<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MABINOGI DRESS ROOM</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;900&family=Bebas+Neue&family=Teko:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="data.js"></script>
<style>
:root {
  --sidebar-w: 220px;
  --topbar-h: 60px;
  --orange: #FF6B2B;
  --orange-light: #FF9F1C;
  --orange-bg: rgba(255,107,43,0.1);
  --green: #2BBF6B;
  --green-bg: rgba(43,191,107,0.1);
  --purple: #7C3AED;
  --purple-bg: rgba(124,58,237,0.1);
  --pink: #EC4899;
  --pink-bg: rgba(236,72,153,0.1);
  --blue: #3B82F6;
  --blue-bg: rgba(59,130,246,0.1);
  --bg: #0F1117;
  --surface: #1A1D27;
  --surface2: #222637;
  --surface3: #2C3048;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #F1F2F6;
  --text-sub: #8B90A7;
  --text-muted: #555A72;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);display:flex;}

/* SIDEBAR */
.sidebar{width:var(--sidebar-w);height:100vh;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;z-index:50;overflow:hidden;}
.sidebar-logo{padding:20px 20px 16px;border-bottom:1px solid var(--border);}
.logo-text{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:var(--text);line-height:1;}
.logo-text span{color:var(--orange);}
.logo-sub{font-size:10px;color:var(--text-muted);margin-top:3px;letter-spacing:1px;text-transform:uppercase;}
.sidebar-section{padding:16px 12px 4px;}
.sidebar-section-label{font-size:10px;font-weight:700;color:var(--text-muted);letter-spacing:1.2px;text-transform:uppercase;padding:0 8px 8px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text-sub);transition:all 0.18s;margin-bottom:2px;border:none;background:none;width:100%;text-align:left;font-family:'Noto Sans KR',sans-serif;}
.nav-item:hover{background:var(--surface2);color:var(--text);}
.nav-item.active{background:var(--orange-bg);color:var(--orange);}
.nav-icon{width:16px;height:16px;flex-shrink:0;opacity:0.7;}
.nav-item.active .nav-icon{opacity:1;color:var(--orange);}
.nav-badge{margin-left:auto;font-size:10px;font-weight:700;background:var(--orange);color:#fff;padding:1px 6px;border-radius:10px;}
.nav-badge.green{background:var(--green);}
.sidebar-bottom{margin-top:auto;padding:16px 12px;border-top:1px solid var(--border);}
.user-info{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;background:var(--surface2);}
.user-avatar{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--orange),var(--orange-light));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#fff;flex-shrink:0;}
.user-name{font-size:12px;font-weight:700;color:var(--text);}
.user-role{font-size:10px;color:var(--text-muted);}

/* MAIN */
.main-area{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;min-width:0;}
.topbar{height:var(--topbar-h);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:12px;flex-shrink:0;}
.topbar-title{font-size:16px;font-weight:900;color:var(--text);white-space:nowrap;}
.topbar-title span{color:var(--text-sub);font-weight:400;font-size:13px;margin-left:8px;}
.topbar-search{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:0 12px;height:34px;transition:border-color 0.2s;flex:1;max-width:320px;margin-left:auto;}
.topbar-search:focus-within{border-color:var(--orange);}
.topbar-search input{border:none;background:transparent;font-family:inherit;font-size:13px;color:var(--text);outline:none;width:100%;}
.topbar-search input::placeholder{color:var(--text-muted);}
.topbar-btn{display:flex;align-items:center;gap:6px;padding:0 14px;height:34px;border-radius:8px;font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all 0.18s;border:1px solid var(--border2);background:var(--surface2);color:var(--text-sub);white-space:nowrap;}
.topbar-btn:hover{border-color:var(--orange);color:var(--orange);}
.topbar-btn.primary{background:var(--orange);border-color:var(--orange);color:#fff;}
.topbar-btn.primary:hover{background:var(--orange-light);border-color:var(--orange-light);}
.topbar-btn.admin{border-color:var(--purple);color:var(--purple);background:var(--purple-bg);}
.topbar-btn.admin:hover{background:var(--purple);color:#fff;}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:20px;}
.content::-webkit-scrollbar{width:4px;}
.content::-webkit-scrollbar-track{background:transparent;}
.content::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:4px;}

/* STAT CARDS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 18px;display:flex;flex-direction:column;gap:10px;transition:border-color 0.2s;}
.stat-card:hover{border-color:var(--border2);}
.stat-card-top{display:flex;align-items:center;justify-content:space-between;}
.stat-card-label{font-size:12px;font-weight:600;color:var(--text-sub);}
.stat-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;}
.stat-icon.orange{background:var(--orange-bg);color:var(--orange);}
.stat-icon.green{background:var(--green-bg);color:var(--green);}
.stat-icon.purple{background:var(--purple-bg);color:var(--purple);}
.stat-icon.pink{background:var(--pink-bg);color:var(--pink);}
.stat-value{font-size:26px;font-weight:900;color:var(--text);line-height:1;}
.stat-value span{font-size:13px;font-weight:500;color:var(--text-sub);margin-left:4px;}
.stat-trend{font-size:11px;font-weight:600;display:flex;align-items:center;gap:4px;}
.stat-trend.up{color:var(--green);}
.stat-trend.down{color:var(--pink);}
.stat-trend.neutral{color:var(--text-muted);}

/* MIDDLE ROW */
.middle-row{display:grid;grid-template-columns:1fr 280px;gap:14px;}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px;}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.card-title{font-size:14px;font-weight:700;color:var(--text);}
.card-sub{font-size:12px;color:var(--text-muted);margin-top:2px;}
.legend{display:flex;gap:14px;flex-wrap:wrap;}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-sub);}
.legend-dot{width:8px;height:8px;border-radius:2px;}
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:100px;}
.bar-group{display:flex;gap:2px;align-items:flex-end;flex:1;}
.bar{flex:1;border-radius:4px 4px 0 0;transition:opacity 0.2s;cursor:pointer;}
.bar:hover{opacity:0.75;}
.bar-wrap{display:flex;flex-direction:column;flex:1;}
.donut-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px;display:flex;flex-direction:column;}
.donut-list{display:flex;flex-direction:column;gap:6px;margin-top:12px;}
.donut-row{display:flex;align-items:center;gap:8px;}
.donut-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
.donut-name{font-size:12px;color:var(--text-sub);flex:1;}
.donut-count{font-size:12px;font-weight:700;color:var(--text);}
.donut-bar-bg{flex:2;background:var(--surface2);border-radius:4px;height:4px;overflow:hidden;}
.donut-bar-fill{height:100%;border-radius:4px;}

/* FILTER + TABLE */
.bottom-section{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.filter-bar{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:8px;}
.filter-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.filter-label{font-size:11px;font-weight:700;color:var(--text-muted);min-width:30px;letter-spacing:0.5px;}
.filter-divider{border:none;border-top:1px solid var(--border);margin:0;}
.chip{border:1px solid var(--border2);background:transparent;border-radius:6px;padding:3px 10px;font-size:11px;font-weight:600;color:var(--text-sub);cursor:pointer;transition:all 0.18s;font-family:'Noto Sans KR',sans-serif;}
.chip:hover{border-color:var(--orange);color:var(--orange);}
.chip.active{background:var(--orange-bg);border-color:var(--orange);color:var(--orange);}
.chip.race:hover{border-color:var(--purple);color:var(--purple);}
.chip.race.active{background:var(--purple-bg);border-color:var(--purple);color:var(--purple);}
.chip.green:hover{border-color:var(--green);color:var(--green);}
.chip.green.active{background:var(--green-bg);border-color:var(--green);color:var(--green);}
.chip.style:hover{border-color:var(--pink);color:var(--pink);}
.chip.style.active{background:var(--pink-bg);border-color:var(--pink);color:var(--pink);}

/* TABLE */
.table-toolbar{padding:12px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.result-count{font-size:13px;font-weight:700;color:var(--text);}
.result-count span{color:var(--orange);}
.view-toggle{display:flex;gap:4px;}
.view-btn{width:28px;height:28px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--text-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.18s;}
.view-btn:hover,.view-btn.active{border-color:var(--orange);color:var(--orange);background:var(--orange-bg);}
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
thead th{padding:10px 16px;text-align:left;font-size:11px;font-weight:700;color:var(--text-muted);letter-spacing:0.5px;text-transform:uppercase;border-bottom:1px solid var(--border);white-space:nowrap;background:var(--surface);}
tbody tr{border-bottom:1px solid var(--border);transition:background 0.15s;cursor:pointer;}
tbody tr:hover{background:var(--surface2);}
tbody tr:last-child{border-bottom:none;}
td{padding:10px 16px;font-size:13px;color:var(--text);white-space:nowrap;}
.td-name{display:flex;align-items:center;gap:10px;}
.td-icon{width:32px;height:32px;border-radius:8px;background:var(--surface2);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:14px;color:var(--text-muted);flex-shrink:0;}
.td-name-text{font-size:12px;font-weight:600;color:var(--text);max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;display:inline-block;}
.tag-gender{background:var(--orange-bg);color:var(--orange);}
.tag-race{background:var(--purple-bg);color:var(--purple);}
.tag-type{background:var(--green-bg);color:var(--green);}
.tag-style{background:var(--pink-bg);color:var(--pink);}
.tag-onsale{background:var(--green-bg);color:var(--green);}
.tag-nosale{background:var(--surface2);color:var(--text-muted);}
.tag-limited{background:var(--orange-bg);color:var(--orange);}
.tag-perm{background:var(--surface2);color:var(--text-muted);}
.price-text{font-weight:700;color:var(--text);font-size:12px;}
.resale-num{font-weight:900;color:var(--blue);font-size:14px;}
.grid-view{display:none;padding:16px;}
.grid-view.active{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;}
.g-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:all 0.2s;}
.g-card:hover{border-color:var(--orange);transform:translateY(-2px);}
.g-card-img{height:100px;background:var(--surface3);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:36px;color:var(--text-muted);}
.g-card-body{padding:10px 12px;}
.g-card-name{font-size:11px;font-weight:700;color:var(--text);margin-bottom:6px;line-height:1.3;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.g-card-tags{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:6px;}
.g-card-price{font-size:12px;font-weight:900;color:var(--orange);}
.no-result{padding:48px 20px;text-align:center;color:var(--text-muted);font-size:14px;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:500;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:16px;width:100%;max-width:820px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,0.5);animation:slideUp 0.25s ease;}
.modal::-webkit-scrollbar{width:4px;}
.modal::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:4px;}
@keyframes slideUp{from{transform:translateY(20px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.modal-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.modal-header h2{font-size:18px;font-weight:900;color:var(--text);margin-bottom:6px;}
.modal-close{width:30px;height:30px;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;color:var(--text-sub);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.18s;flex-shrink:0;}
.modal-close:hover{border-color:var(--orange);color:var(--orange);}
.modal-body{padding:20px 24px;display:flex;flex-direction:column;gap:20px;}
.modal-layout{display:grid;grid-template-columns:160px 1fr;gap:16px;}
.modal-img-box{height:160px;background:var(--surface2);border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:52px;color:var(--text-muted);border:1px solid var(--border);}
.info-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;}
.info-tag{font-size:11px;font-weight:700;padding:3px 10px;border-radius:6px;}
.info-tag-orange{background:var(--orange-bg);color:var(--orange);}
.info-tag-green{background:var(--green-bg);color:var(--green);}
.info-tag-purple{background:var(--purple-bg);color:var(--purple);}
.info-tag-pink{background:var(--pink-bg);color:var(--pink);}
.info-tag-gray{background:var(--surface2);color:var(--text-sub);}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.stat-box{background:var(--surface2);border-radius:8px;padding:10px 12px;border:1px solid var(--border);}
.stat-box-label{font-size:10px;color:var(--text-muted);margin-bottom:3px;}
.stat-box-value{font-size:18px;font-weight:900;color:var(--text);}
.stat-box-value.orange{color:var(--orange);}
.stat-box-value.green{color:var(--green);}
.m-section{}
.m-section-title{font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.m-section-title::before{content:'';width:3px;height:12px;border-radius:2px;background:var(--orange);display:block;}
.m-section-title.green::before{background:var(--green);}
.m-section-title.blue::before{background:var(--blue);}
.parts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:6px;}
.part-row{background:var(--surface2);border-radius:7px;padding:8px 12px;border:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.part-name{font-size:12px;font-weight:500;color:var(--text);}
.part-count{font-size:11px;font-weight:700;color:var(--orange);background:var(--orange-bg);padding:1px 6px;border-radius:4px;}
.enchant-list{display:flex;flex-direction:column;gap:6px;}
.enchant-row{background:var(--green-bg);border:1px solid rgba(43,191,107,0.2);border-radius:8px;padding:10px 14px;display:flex;justify-content:space-between;align-items:flex-start;}
.enchant-name{font-size:12px;font-weight:700;color:var(--green);}
.enchant-slot{font-size:10px;color:var(--text-muted);margin-top:2px;}
.enchant-effect{font-size:11px;color:var(--text-sub);text-align:right;max-width:55%;}
.price-box{background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;}
.price-label{font-size:11px;color:var(--text-muted);margin-bottom:4px;}
.price-value{font-size:22px;font-weight:900;color:var(--orange);}
.price-date{font-size:10px;color:var(--text-muted);margin-top:2px;}
.price-range{text-align:right;display:flex;flex-direction:column;gap:4px;}
.price-range-row{display:flex;align-items:center;gap:6px;justify-content:flex-end;}
.price-range-label{font-size:10px;color:var(--text-muted);}
.price-range-val{font-size:12px;font-weight:700;}
.price-range-val.low{color:var(--green);}
.price-range-val.high{color:var(--pink);}
.resale-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
.resale-stat{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;text-align:center;}
.resale-stat-val{font-size:20px;font-weight:900;color:var(--blue);line-height:1;}
.resale-stat-label{font-size:10px;color:var(--text-muted);margin-top:4px;}
.resale-timeline{display:flex;flex-direction:column;gap:0;}
.timeline-item{display:flex;gap:12px;position:relative;}
.timeline-item::before{content:'';position:absolute;left:13px;top:28px;bottom:-6px;width:1px;background:var(--border2);}
.timeline-item:last-child::before{display:none;}
.timeline-left{display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0;padding-top:6px;}
.timeline-dot{width:26px;height:26px;border-radius:50%;background:var(--blue-bg);border:2px solid var(--blue);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;color:var(--blue);flex-shrink:0;}
.timeline-dot.first{background:var(--orange-bg);border-color:var(--orange);color:var(--orange);}
.timeline-right{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;flex:1;margin-bottom:8px;}
.timeline-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;gap:8px;flex-wrap:wrap;}
.timeline-period{font-size:12px;font-weight:700;color:var(--text);}
.timeline-channel-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;}
.ch-cashshop{background:var(--orange-bg);color:var(--orange);}
.ch-event{background:var(--purple-bg);color:var(--purple);}
.ch-package{background:var(--pink-bg);color:var(--pink);}
.timeline-meta{display:flex;gap:12px;flex-wrap:wrap;}
.timeline-meta-item{font-size:11px;color:var(--text-muted);}
.timeline-meta-item strong{color:var(--text-sub);font-weight:600;}
.resale-empty{background:var(--surface2);border:1px dashed var(--border2);border-radius:8px;padding:24px;text-align:center;color:var(--text-muted);font-size:13px;}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:12px 18px;font-size:13px;font-weight:600;color:var(--text);box-shadow:0 8px 32px rgba(0,0,0,0.4);z-index:9999;transform:translateY(20px);opacity:0;transition:all 0.3s;pointer-events:none;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.success{border-color:var(--green);color:var(--green);}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-text">MABINOGI <span>DRESS</span></div>
    <div class="logo-sub">DRESS ROOM v2.0</div>
  </div>
  <div class="sidebar-section">
    <div class="sidebar-section-label">메인</div>
    <button class="nav-item active" onclick="setPage('dashboard',this)">
      <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      대시보드
    </button>
    <button class="nav-item" id="navItems" onclick="setPage('items',this)">

      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>

          <div class="legend">

          <button class="chip" onclick="setFilter('gender','공용',this)">공용</button>
        </div>
        <hr class="filter-divider"/>
        <div class="filter-row">
          <span class="filter-label">종족</span>
          <button class="chip race active" onclick="setFilter('race','all',this)">전체</button>
          <button class="chip race" onclick="setFilter('race','인간',this)">인간</button>
          <button class="chip race" onclick="setFilter('race','엘프',this)">엘프</button>
          <button class="chip race" onclick="setFilter('race','자이언트',this)">자이언트</button>
        </div>
        <hr class="filter-divider"/>
        <div class="filter-row" id="typeFilterRow">
          <span class="filter-label">종류</span>
        </div>
        <hr class="filter-divider"/>
        <div class="filter-row" id="styleFilterRow">
          <span class="filter-label">스타일</span>
        </div>

      <div class="table-toolbar">

        <div class="view-toggle">
          <button class="view-btn active" id="btnTable" onclick="setView('table')" title="테이블 뷰">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          </button>
          <button class="view-btn" id="btnGrid" onclick="setView('grid')" title="그리드 뷰">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          </button>

            <th>의장명</th><th>성별</th><th>종족</th><th>종류</th>
            <th>스타일</th><th>시즌</th><th>재판매</th><th>판매상태</th><th>시세</th>
          </tr></thead>
          <tbody id="tableBody"></tbody>

        <div class="no-result" id="noResult" style="display:none">검색 결과가 없습니다.</div>

  <div class="modal">

      <div>
        <h2 id="mName">-</h2>
        <div class="info-tags" id="mTags"></div>

        <div class="modal-img-box" id="mImg">-</div>
        <div><div class="stat-grid" id="mStats"></div></div>
      </div>
      <div class="m-section"><div class="m-section-title">구성 파츠</div><div class="parts-grid" id="mParts"></div></div>
      <div class="m-section"><div class="m-section-title green">인챈트 정보</div><div class="enchant-list" id="mEnchants"></div></div>
      <div class="m-section"><div class="m-section-title">경매장 시세</div><div class="price-box" id="mPrice"></div></div>
      <div class="m-section">
        <div class="m-section-title blue">재판매 이력</div>
        <div class="resale-summary" id="mResaleSummary"></div>
        <div class="resale-timeline" id="mResaleTimeline"></div>
      </div>
    </div>

<div class="toast" id="toast"></div>

<script>
let ITEMS = loadItems();
let currentFilter = { gender:'all', race:'all', type:'all', style:'all' };
let currentSearch = '';
let currentView = 'table';
let currentPage = 'dashboard';

// 데이터 변경 감지 (admin 탭에서 저장하면 반영)
window.addEventListener('storage', e => {
  if (e.key === 'mabinogi_dress_items') {
    ITEMS = loadItems();
    init();
    showToast('데이터가 업데이트되었습니다.', 'success');
  }
});

function init() {
  updateBadges();
  renderDynamicFilters();
  renderStats();
  renderCharts();
  renderTable(currentPage === 'onsale');
}

function updateBadges() {
  document.getElementById('badgeAll').textContent = ITEMS.length;
  document.getElementById('badgeSale').textContent = ITEMS.filter(i=>i.onSale).length;
}

function renderDynamicFilters() {
  const types = [...new Set(ITEMS.map(i=>i.type))].sort();
  const styles = [...new Set(ITEMS.map(i=>i.style))].sort();
  const typeRow = document.getElementById('typeFilterRow');
  const styleRow = document.getElementById('styleFilterRow');
  typeRow.innerHTML = '<span class="filter-label">종류</span>' +
    '<button class="chip green active" onclick="setFilter(\'type\',\'all\',this)">전체</button>' +
    types.map(t=>`<button class="chip green" onclick="setFilter('type','${t}',this)">${t}</button>`).join('');
  styleRow.innerHTML = '<span class="filter-label">스타일</span>' +
    '<button class="chip style active" onclick="setFilter(\'style\',\'all\',this)">전체</button>' +
    styles.map(s=>`<button class="chip style" onclick="setFilter('style','${s}',this)">${s}</button>`).join('');
}

function renderStats() {
  const total = ITEMS.length;
  const onSale = ITEMS.filter(i=>i.onSale).length;
  const salePct = total > 0 ? ((onSale/total)*100).toFixed(1) : 0;
  const avgResale = total > 0 ? (ITEMS.reduce((s,i)=>s+i.resale.length,0)/total).toFixed(1) : 0;
  const topPrice = total > 0 ? Math.max(...ITEMS.map(i=>i.price)) : 0;
  const topItem = ITEMS.find(i=>i.price===topPrice);
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card">
      <div class="stat-card-top"><div class="stat-card-label">전체 의장</div>
        <div class="stat-icon orange"><svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 7H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg></div>
      </div>
      <div class="stat-value">${total} <span>종</span></div>
      <div class="stat-trend neutral">전체 등록 의장 수</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-top"><div class="stat-card-label">현재 판매중</div>
        <div class="stat-icon green"><svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg></div>
      </div>
      <div class="stat-value" style="color:var(--green)">${onSale} <span style="color:var(--text-sub)">종</span></div>
      <div class="stat-trend up"><svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg>전체의 ${salePct}% 판매중</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-top"><div class="stat-card-label">평균 재판매 횟수</div>
        <div class="stat-icon purple"><svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/></svg></div>
      </div>
      <div class="stat-value" style="color:var(--blue)">${avgResale} <span>회</span></div>
      <div class="stat-trend neutral">의장당 평균 재판매</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-top"><div class="stat-card-label">최고 시세</div>
        <div class="stat-icon pink"><svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div>
      </div>
      <div class="stat-value" style="color:var(--pink)">${Math.round(topPrice/10000)} <span>만G</span></div>
      <div class="stat-trend down">${topItem ? topItem.name.substring(0,12)+'...' : '-'}</div>
    </div>`;
}

function renderCharts() {
  const categories = [...new Set(ITEMS.map(i=>i.type))];
  const colors = ['#FF6B2B','#2BBF6B','#7C3AED','#EC4899','#3B82F6','#F59E0B','#06B6D4','#10B981','#F97316','#8B5CF6'];
  const maxCount = Math.max(1, ...categories.map(c=>ITEMS.filter(x=>x.type===c).length));
  document.getElementById('barChart').innerHTML = categories.map((cat,i)=>{
    const total = ITEMS.filter(x=>x.type===cat).length;
    const sale  = ITEMS.filter(x=>x.type===cat&&x.onSale).length;
    const h1 = Math.max(8,(total/maxCount)*100);
    const h2 = Math.max(4,(sale/maxCount)*100);
    return `<div class="bar-wrap"><div class="bar-group" style="height:100px">
      <div class="bar" style="height:${h1}px;background:${colors[i%colors.length]};opacity:0.7" title="${cat}: ${total}종"></div>
      <div class="bar" style="height:${h2}px;background:${colors[i%colors.length]}" title="판매중: ${sale}종"></div>
    </div></div>`;
  }).join('');
  document.getElementById('barLabels').innerHTML = categories.map(cat=>
    `<div style="flex:1;text-align:center;font-size:9px;color:var(--text-muted)">${cat.length>4?cat.substring(0,4)+'..':cat}</div>`
  ).join('');

  const styles = [...new Set(ITEMS.map(i=>i.style))];
  const sc = ['#3B82F6','#EC4899','#F59E0B','#7C3AED','#2BBF6B','#FF6B2B','#06B6D4','#8B5CF6','#10B981','#F97316'];
  const maxStyle = Math.max(1,...styles.map(s=>ITEMS.filter(x=>x.style===s).length));
  document.getElementById('donutList').innerHTML = styles.map((s,i)=>{
    const cnt = ITEMS.filter(x=>x.style===s).length;
    if(!cnt) return '';
    const pct = (cnt/maxStyle)*100;
    return `<div class="donut-row">
      <div class="donut-dot" style="background:${sc[i%sc.length]}"></div>
      <div class="donut-name">${s}</div>
      <div class="donut-bar-bg"><div class="donut-bar-fill" style="width:${pct}%;background:${sc[i%sc.length]}"></div></div>
      <div class="donut-count">${cnt}</div>
    </div>`;
  }).filter(Boolean).join('');
}

function getFiltered(onSaleOnly) {
  return ITEMS.filter(item => {
    if (onSaleOnly && !item.onSale) return false;
    const gOk = currentFilter.gender==='all' || item.gender===currentFilter.gender;
    const rOk = currentFilter.race==='all'   || item.race===currentFilter.race;
    const tOk = currentFilter.type==='all'   || item.type===currentFilter.type;
    const sOk = currentFilter.style==='all'  || item.style===currentFilter.style;
    const qOk = !currentSearch || item.name.toLowerCase().includes(currentSearch.toLowerCase());
    return gOk && rOk && tOk && sOk && qOk;
  });
}

function fmt(n) { return n.toLocaleString('ko-KR') + 'G'; }

function renderTable(onSaleOnly) {
  const filtered = getFiltered(onSaleOnly);
  document.getElementById('resultCount').innerHTML = '총 <span>' + filtered.length + '</span>개';
  if (currentView === 'table') {
    const tbody = document.getElementById('tableBody');
    const noRes = document.getElementById('noResult');
    if (!filtered.length) { tbody.innerHTML=''; noRes.style.display=''; return; }
    noRes.style.display='none';
    tbody.innerHTML = filtered.map(item=>`
      <tr onclick="openModal(${item.id})">
        <td><div class="td-name"><div class="td-icon">${item.icon||item.name[0]}</div><div class="td-name-text">${item.name}</div></div></td>
        <td><span class="tag tag-gender">${item.gender}</span></td>
        <td><span class="tag tag-race">${item.race}</span></td>
        <td><span class="tag tag-type">${item.type}</span></td>
        <td><span class="tag tag-style">${item.style}</span></td>
        <td><span class="tag ${item.season==='기간한정'?'tag-limited':'tag-perm'}">${item.season}</span></td>
        <td><span class="resale-num">${item.resale.length}회</span></td>
        <td><span class="tag ${item.onSale?'tag-onsale':'tag-nosale'}">${item.onSale?'판매중':'판매종료'}</span></td>
        <td><span class="price-text">${fmt(item.price)}</span></td>
      </tr>`).join('');
  } else {
    const gv = document.getElementById('gridView');
    if (!filtered.length) { gv.innerHTML='<div class="no-result">검색 결과가 없습니다.</div>'; return; }
    gv.innerHTML = filtered.map(item=>`
      <div class="g-card" onclick="openModal(${item.id})">
        <div class="g-card-img">${item.icon||item.name[0]}</div>
        <div class="g-card-body">
          <div class="g-card-name">${item.name}</div>
          <div class="g-card-tags">
            <span class="tag tag-gender">${item.gender}</span>
            <span class="tag tag-type">${item.type}</span>
            <span class="tag tag-style">${item.style}</span>
          </div>
          <div class="g-card-price">${fmt(item.price)}</div>
        </div>
      </div>`).join('');
  }
}

function setFilter(key, val, el) {
  currentFilter[key] = val;
  let sel;
  if(key==='type') sel='.chip.green';
  else if(key==='race') sel='.chip.race';
  else if(key==='style') sel='.chip.style';
  else sel='.chip:not(.green):not(.race):not(.style)';
  el.closest('.filter-row').querySelectorAll(sel).forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  renderTable(currentPage==='onsale');
}

function setView(v) {
  currentView = v;
  document.getElementById('btnTable').classList.toggle('active', v==='table');
  document.getElementById('btnGrid').classList.toggle('active',  v==='grid');
  document.getElementById('tableWrap').style.display = v==='table' ? '' : 'none';
  document.getElementById('gridView').classList.toggle('active', v==='grid');
  renderTable(currentPage==='onsale');
}

function setPage(page, btn) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const titles = {
    dashboard:'대시보드 <span>전체 현황 한눈에 보기</span>',
    items:'의장 전체보기 <span>등록된 모든 의장 목록</span>',
    onsale:'현재 판매중 <span>캐시샵 판매 의장</span>',
    resale:'재판매 이력 <span>과거 판매 기록 분석</span>',
    price:'경매장 시세 <span>최신 시세 정보</span>',
  };
  document.getElementById('topbarTitle').innerHTML = titles[page]||titles['dashboard'];
  renderTable(page==='onsale');
}

function handleSearch(val) {
  currentSearch = val.trim();
  renderTable(currentPage==='onsale');
}

function openModal(id) {
  const item = ITEMS.find(i=>i.id===id);
  if(!item) return;
  document.getElementById('mName').textContent = item.name;
  document.getElementById('mTags').innerHTML = `
    <span class="info-tag info-tag-orange">${item.gender}</span>
    <span class="info-tag info-tag-purple">${item.race}</span>
    <span class="info-tag info-tag-green">${item.type}</span>
    <span class="info-tag info-tag-pink">${item.style}</span>
    <span class="info-tag info-tag-gray">${item.season}</span>
    <span class="info-tag ${item.onSale?'info-tag-green':'info-tag-gray'}">${item.onSale?'판매중':'판매종료'}</span>`;
  document.getElementById('mImg').textContent = item.icon||item.name[0];
  document.getElementById('mStats').innerHTML = `
    <div class="stat-box"><div class="stat-box-label">방어력</div><div class="stat-box-value orange">${item.defense}</div></div>
    <div class="stat-box"><div class="stat-box-label">보호</div><div class="stat-box-value green">${item.prot}</div></div>
    <div class="stat-box"><div class="stat-box-label">내구도</div><div class="stat-box-value">${item.dur}/${item.durMax}</div></div>`;
  document.getElementById('mParts').innerHTML = (item.parts||[]).map(p=>
    `<div class="part-row"><span class="part-name">${p.name}</span><span class="part-count">x${p.count}</span></div>`
  ).join('') || '<div style="color:var(--text-muted);font-size:13px">파츠 정보 없음</div>';
  document.getElementById('mEnchants').innerHTML = (item.enchants||[]).map(e=>
    `<div class="enchant-row"><div><div class="enchant-name">${e.name}</div><div class="enchant-slot">${e.slot} 인챈트</div></div><div class="enchant-effect">${e.effect}</div></div>`
  ).join('') || '<div style="color:var(--text-muted);font-size:13px">인챈트 정보 없음</div>';
  document.getElementById('mPrice').innerHTML = `
    <div>
      <div class="price-label">현재 시세</div>
      <div class="price-value">${fmt(item.price)}</div>
      <div class="price-date">기준일: ${item.priceDate}</div>
    </div>
    <div class="price-range">
      <div class="price-range-row"><span class="price-range-label">최저</span><span class="price-range-val low">${fmt(item.priceMin)}</span></div>
      <div class="price-range-row"><span class="price-range-label">최고</span><span class="price-range-val high">${fmt(item.priceMax)}</span></div>
    </div>`;
  const rs = item.resale||[];
  if(!rs.length) {
    document.getElementById('mResaleSummary').innerHTML='';
    document.getElementById('mResaleTimeline').innerHTML='<div class="resale-empty">재판매 이력이 없습니다. (신규 의장)</div>';
  } else {
    const sorted=[...rs].sort((a,b)=>b.nth-a.nth);
    const lastDate=sorted[0].startDate;
    let avgCycle='-';
    if(rs.length>=2){
      const dates=[...rs].sort((a,b)=>new Date(a.startDate)-new Date(b.startDate)).map(r=>new Date(r.startDate));
      let gaps=[];
      for(let i=1;i<dates.length;i++) gaps.push((dates[i]-dates[i-1])/(1000*60*60*24));
      avgCycle=Math.round(gaps.reduce((a,b)=>a+b,0)/gaps.length)+'일';
    }
    document.getElementById('mResaleSummary').innerHTML=`
      <div class="resale-stat"><div class="resale-stat-val">${rs.length}</div><div class="resale-stat-label">총 재판매 횟수</div></div>
      <div class="resale-stat"><div class="resale-stat-val" style="font-size:14px;padding-top:2px">${lastDate}</div><div class="resale-stat-label">최근 판매 시작일</div></div>
      <div class="resale-stat"><div class="resale-stat-val">${avgCycle}</div><div class="resale-stat-label">평균 재판매 주기</div></div>`;
    const chClass={캐시샵:'ch-cashshop',이벤트:'ch-event',패키지:'ch-package'};
    document.getElementById('mResaleTimeline').innerHTML=sorted.map(r=>`
      <div class="timeline-item">
        <div class="timeline-left"><div class="timeline-dot ${r.nth===1?'first':''}">${r.nth}</div></div>
        <div class="timeline-right">
          <div class="timeline-top">
            <span class="timeline-period">${r.startDate} ~ ${r.endDate}</span>
            <span class="timeline-channel-badge ${chClass[r.channel]||'ch-cashshop'}">${r.channel}</span>
          </div>
          <div class="timeline-meta">
            <div class="timeline-meta-item"><strong>판매 기간</strong> ${r.durationDays}일</div>
            ${r.note?`<div class="timeline-meta-item"><strong>비고</strong> ${r.note}</div>`:''}
          </div>
        </div>
      </div>`).join('');
  }
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeModal(e) { if(e.target===document.getElementById('modalOverlay')) closeModalDirect(); }
function closeModalDirect() { document.getElementById('modalOverlay').classList.remove('open'); document.body.style.overflow=''; }

function exportJSON() {
  const blob = new Blob([JSON.stringify(ITEMS, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'mabinogi_dress_data.json';
  a.click();
  showToast('JSON 파일로 내보냈습니다.', 'success');
}

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type?' '+type:'');
  setTimeout(()=>{ t.className='toast'; }, 2500);
}

init();
</script>
</body>
</html>
