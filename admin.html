<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DRESS ROOM — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;900&family=Bebas+Neue&display=swap" rel="stylesheet"/>
<script src="data.js"></script>
<style>
:root{
  --orange:#FF6B2B;--orange-light:#FF9F1C;--orange-bg:rgba(255,107,43,0.1);
  --green:#2BBF6B;--green-bg:rgba(43,191,107,0.1);
  --purple:#7C3AED;--purple-bg:rgba(124,58,237,0.1);
  --pink:#EC4899;--pink-bg:rgba(236,72,153,0.1);
  --blue:#3B82F6;--blue-bg:rgba(59,130,246,0.1);
  --red:#EF4444;--red-bg:rgba(239,68,68,0.1);
  --yellow:#F59E0B;--yellow-bg:rgba(245,158,11,0.1);
  --bg:#0F1117;--surface:#1A1D27;--surface2:#222637;--surface3:#2C3048;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#F1F2F6;--text-sub:#8B90A7;--text-muted:#555A72;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;overflow:hidden;}

/* ── TOPBAR ── */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;flex-shrink:0;}
.topbar-logo{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;}
.topbar-logo span{color:var(--orange);}
.badge-admin{background:var(--purple-bg);border:1px solid var(--purple);color:var(--purple);font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px;letter-spacing:0.5px;}
.topbar-right{margin-left:auto;display:flex;gap:6px;align-items:center;}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:0 14px;height:32px;border-radius:7px;font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all 0.18s;border:1px solid var(--border2);background:var(--surface2);color:var(--text-sub);white-space:nowrap;text-decoration:none;}
.btn:hover{border-color:var(--orange);color:var(--orange);}
.btn.primary{background:var(--orange);border-color:var(--orange);color:#fff;}
.btn.primary:hover{background:var(--orange-light);}
.btn.success{background:var(--green-bg);border-color:var(--green);color:var(--green);}
.btn.success:hover{background:var(--green);color:#fff;}
.btn.danger{background:var(--red-bg);border-color:var(--red);color:var(--red);}
.btn.danger:hover{background:var(--red);color:#fff;}
.btn.purple{background:var(--purple-bg);border-color:var(--purple);color:var(--purple);}
.btn.purple:hover{background:var(--purple);color:#fff;}
.btn.sm{height:26px;padding:0 10px;font-size:11px;border-radius:5px;}

/* ── LAYOUT ── */
.page{display:grid;grid-template-columns:300px 1fr;height:calc(100vh - 56px);overflow:hidden;}

/* ── LEFT PANEL ── */
.panel-left{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.list-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.list-search{display:flex;align-items:center;gap:7px;background:var(--surface2);border:1px solid var(--border2);border-radius:7px;padding:0 10px;height:30px;flex:1;}
.list-search:focus-within{border-color:var(--orange);}
.list-search input{border:none;background:transparent;font-family:inherit;font-size:12px;color:var(--text);outline:none;width:100%;}
.list-search input::placeholder{color:var(--text-muted);}
.list-count{font-size:11px;color:var(--text-muted);white-space:nowrap;}
.list-body{flex:1;overflow-y:auto;}
.list-body::-webkit-scrollbar{width:3px;}
.list-body::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:3px;}
.list-item{padding:9px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.15s;display:flex;align-items:center;gap:10px;}
.list-item:hover{background:var(--surface2);}
.list-item.active{background:var(--orange-bg);border-left:3px solid var(--orange);}
.list-item-thumb{width:36px;height:36px;border-radius:7px;background:var(--surface2);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;}
.list-item-thumb img{width:100%;height:100%;object-fit:cover;}
.list-item-thumb-placeholder{font-family:'Bebas Neue',sans-serif;font-size:14px;color:var(--text-muted);}
.list-item.active .list-item-thumb{border-color:var(--orange);}
.list-item-info{flex:1;min-width:0;}
.list-item-name{font-size:12px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.list-item.active .list-item-name{color:var(--orange);}
.list-item-meta{font-size:10px;color:var(--text-muted);margin-top:2px;}
.list-item-badge{font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px;flex-shrink:0;}
.badge-on{background:var(--green-bg);color:var(--green);}
.badge-off{background:var(--surface2);color:var(--text-muted);}
.list-footer{padding:12px 16px;border-top:1px solid var(--border);}

/* ── RIGHT PANEL (FORM) ── */
.panel-right{overflow-y:auto;padding:24px;}
.panel-right::-webkit-scrollbar{width:4px;}
.panel-right::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:4px;}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;color:var(--text-muted);}
.empty-state svg{opacity:0.15;}
.empty-state p{font-size:14px;}

/* ── FORM SECTIONS ── */
.form-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:12px;}
.form-title{font-size:17px;font-weight:900;color:var(--text);}
.form-title small{font-size:12px;font-weight:400;color:var(--text-muted);margin-left:8px;}
.form-actions{display:flex;gap:8px;flex-shrink:0;}

.section{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px;margin-bottom:14px;}
.section-title{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:14px;display:flex;align-items:center;gap:6px;}
.section-title::before{content:'';width:3px;height:11px;border-radius:2px;background:var(--orange);display:block;}
.section-title.green::before{background:var(--green);}
.section-title.blue::before{background:var(--blue);}
.section-title.purple::before{background:var(--purple);}
.section-title.yellow::before{background:var(--yellow);}
.section-title .section-action{margin-left:auto;}

/* ── FORM FIELDS ── */
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.col-full{grid-column:1/-1;}

.field{display:flex;flex-direction:column;gap:4px;}
.field label{font-size:11px;font-weight:700;color:var(--text-muted);}
.field input,.field select,.field textarea{
  background:var(--surface2);border:1px solid var(--border2);border-radius:7px;
  padding:7px 11px;font-family:'Noto Sans KR',sans-serif;font-size:13px;color:var(--text);
  outline:none;transition:border-color 0.2s;width:100%;
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--orange);}
.field select option{background:var(--surface2);}
.field textarea{resize:vertical;min-height:64px;line-height:1.6;}

/* ── CHECKBOX ROW ── */
.check-group{display:flex;gap:20px;flex-wrap:wrap;padding:4px 0;}
.check-item{display:flex;align-items:center;gap:7px;cursor:pointer;}
.check-item input[type=checkbox]{width:15px;height:15px;accent-color:var(--orange);cursor:pointer;}
.check-item label{font-size:13px;color:var(--text);cursor:pointer;font-weight:500;}

/* ── STYLE MULTI-SELECT ── */
.style-picker{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.style-chip{border:1px solid var(--border2);background:transparent;border-radius:6px;padding:4px 12px;font-size:12px;font-weight:600;color:var(--text-sub);cursor:pointer;transition:all 0.15s;font-family:'Noto Sans KR',sans-serif;}
.style-chip:hover{border-color:var(--pink);color:var(--pink);}
.style-chip.selected{background:var(--pink-bg);border-color:var(--pink);color:var(--pink);}
.style-add-row{display:flex;gap:6px;align-items:center;margin-top:4px;}
.style-add-row input{background:var(--surface2);border:1px solid var(--border2);border-radius:7px;padding:5px 10px;font-family:'Noto Sans KR',sans-serif;font-size:12px;color:var(--text);outline:none;flex:1;}
.style-add-row input:focus{border-color:var(--pink);}

/* ── IMAGE SECTION ── */
.img-upload-area{display:flex;gap:12px;align-items:flex-start;flex-wrap:wrap;}
.img-main-box{display:flex;flex-direction:column;gap:6px;}
.img-preview{width:90px;height:90px;border-radius:9px;border:1px solid var(--border2);background:var(--surface2);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;}
.img-preview img{width:100%;height:100%;object-fit:cover;}
.img-preview-placeholder{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--text-muted);}
.img-preview-btn{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.5);opacity:0;transition:opacity 0.2s;cursor:pointer;border-radius:9px;font-size:11px;font-weight:700;color:#fff;}
.img-preview:hover .img-preview-btn{opacity:1;}
.img-path-input{background:var(--surface2);border:1px solid var(--border2);border-radius:7px;padding:6px 10px;font-family:'Noto Sans KR',sans-serif;font-size:12px;color:var(--text);outline:none;width:100%;max-width:260px;}
.img-path-input:focus{border-color:var(--orange);}
.img-path-hint{font-size:10px;color:var(--text-muted);margin-top:2px;}
.img-extra-list{display:flex;flex-direction:column;gap:6px;flex:1;min-width:200px;}
.img-extra-row{display:flex;gap:6px;align-items:center;}
.img-extra-row input{background:var(--surface2);border:1px solid var(--border2);border-radius:7px;padding:5px 10px;font-family:'Noto Sans KR',sans-serif;font-size:12px;color:var(--text);outline:none;flex:1;}
.img-extra-row input:focus{border-color:var(--orange);}
.img-extra-thumb{width:32px;height:32px;border-radius:5px;border:1px solid var(--border);background:var(--surface2);flex-shrink:0;overflow:hidden;}
.img-extra-thumb img{width:100%;height:100%;object-fit:cover;}

/* ── DYNAMIC ROWS ── */
.dyn-header{display:grid;gap:8px;padding:0 10px 6px;}
.dyn-header.color-h{grid-template-columns:1fr 90px 32px;}
.dyn-header.enchant-h{grid-template-columns:1fr 80px 1fr 32px;}
.dyn-header.sale-h{grid-template-columns:1fr 1fr 70px 100px 1fr 32px;}
.dyn-col{font-size:10px;font-weight:700;color:var(--text-muted);letter-spacing:0.3px;}
.dyn-list{display:flex;flex-direction:column;gap:5px;}
.dyn-row{display:grid;gap:8px;align-items:center;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;}
.dyn-row.color-r{grid-template-columns:1fr 90px 32px;}
.dyn-row.enchant-r{grid-template-columns:1fr 80px 1fr 32px;}
.dyn-row.sale-r{grid-template-columns:1fr 1fr 70px 100px 1fr 32px;}
.dyn-row input,.dyn-row select{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:5px 8px;font-family:'Noto Sans KR',sans-serif;font-size:12px;color:var(--text);outline:none;width:100%;}
.dyn-row input:focus,.dyn-row select:focus{border-color:var(--orange);}
.dyn-row select option{background:var(--surface2);}
.dyn-add{width:100%;display:flex;align-items:center;gap:6px;justify-content:center;padding:7px;border-radius:7px;border:1px dashed var(--border2);background:transparent;font-family:'Noto Sans KR',sans-serif;font-size:12px;color:var(--text-muted);cursor:pointer;transition:all 0.18s;margin-top:5px;}
.dyn-add:hover{border-color:var(--orange);color:var(--orange);}
.del-btn{width:28px;height:28px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--text-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.18s;flex-shrink:0;font-size:13px;line-height:1;}
.del-btn:hover{border-color:var(--red);color:var(--red);background:var(--red-bg);}

/* 색상 파트 총계 배지 */
.color-total{font-size:11px;font-weight:700;color:var(--orange);background:var(--orange-bg);border:1px solid var(--orange);border-radius:6px;padding:3px 10px;display:inline-block;}

/* ── TOAST ── */
.toast{position:fixed;bottom:20px;right:20px;background:var(--surface);border:1px solid var(--border2);border-radius:9px;padding:11px 16px;font-size:13px;font-weight:600;color:var(--text);box-shadow:0 8px 30px rgba(0,0,0,0.5);z-index:9999;transform:translateY(16px);opacity:0;transition:all 0.28s;pointer-events:none;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.success{border-color:var(--green);color:var(--green);}
.toast.error{border-color:var(--red);color:var(--red);}

/* ── CONFIRM MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:800;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.overlay.open{display:flex;}
.confirm-box{background:var(--surface);border:1px solid var(--border2);border-radius:14px;padding:28px 24px;width:340px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.5);animation:pop .22s ease;}
@keyframes pop{from{transform:scale(.94);opacity:0;}to{transform:scale(1);opacity:1;}}
.confirm-title{font-size:16px;font-weight:900;margin-bottom:8px;}
.confirm-msg{font-size:13px;color:var(--text-sub);margin-bottom:20px;line-height:1.6;}
.confirm-actions{display:flex;gap:8px;justify-content:center;}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-logo">MABINOGI <span>DRESS</span></div>
  <div class="badge-admin">ADMIN</div>
  <div class="topbar-right">
    <button class="btn" onclick="document.getElementById('fileInput').click()">
      <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      JSON 가져오기
    </button>
    <button class="btn" onclick="exportJSON()">
      <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 10 12 15 7 10"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      JSON 내보내기
    </button>
    <button class="btn" onclick="confirmReset()">
      <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-5.49"/></svg>
      초기화
    </button>
    <a href="index.html" class="btn success">
      <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      대시보드
    </a>
  </div>
</div>

<!-- PAGE -->
<div class="page">

  <!-- LEFT: 목록 -->
  <div class="panel-left">
    <div class="list-header">
      <div class="list-search">
        <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" placeholder="의장 검색..." oninput="filterList(this.value)"/>
      </div>
      <div class="list-count" id="listCount">0종</div>
    </div>
    <div class="list-body" id="listBody"></div>
    <div class="list-footer">
      <button class="btn primary" style="width:100%;justify-content:center" onclick="createNew()">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        새 의장 추가
      </button>
    </div>
  </div>

  <!-- RIGHT: 편집 -->
  <div class="panel-right" id="panelRight">
    <div class="empty-state" id="emptyState">
      <svg width="44" height="44" fill="none" stroke="currentColor" stroke-width="1.2" viewBox="0 0 24 24"><path d="M20 7H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
      <p>왼쪽에서 의장을 선택하거나 새 의장을 추가하세요.</p>
    </div>
    <div id="formArea" style="display:none"></div>
  </div>
</div>

<!-- CONFIRM MODAL -->
<div class="overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="confirm-title" id="confirmTitle">확인</div>
    <div class="confirm-msg" id="confirmMsg"></div>
    <div class="confirm-actions">
      <button class="btn" onclick="document.getElementById('confirmOverlay').classList.remove('open')">취소</button>
      <button class="btn danger" id="confirmOk">확인</button>
    </div>
  </div>
</div>

<input type="file" id="fileInput" accept=".json" style="display:none" onchange="handleImport(this)"/>
<div class="toast" id="toast"></div>

<script>
// ─── 상태 ───────────────────────────────────────────
let ITEMS = loadItems();
let STYLES = loadStyles();
let selectedId = null;
let searchQuery = '';

// ─── 목록 렌더링 ────────────────────────────────────
function renderList() {
  const q = searchQuery.toLowerCase();
  const filtered = ITEMS.filter(i => !q || i.name.toLowerCase().includes(q));
  document.getElementById('listCount').textContent = filtered.length + '종';
  document.getElementById('listBody').innerHTML = filtered.length
    ? filtered.map(item => {
        const thumbHtml = item.iconPath
          ? `<img src="${escHtml(item.iconPath)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
          + `<span class="list-item-thumb-placeholder" style="display:none">${(item.name||'?')[0]}</span>`
          : `<span class="list-item-thumb-placeholder">${(item.name||'?')[0]}</span>`;
        const styles = (item.style||[]).join(', ') || '-';
        return `<div class="list-item ${item.id===selectedId?'active':''}" onclick="selectItem(${item.id})">
          <div class="list-item-thumb">${thumbHtml}</div>
          <div class="list-item-info">
            <div class="list-item-name">${escHtml(item.name)}</div>
            <div class="list-item-meta">${item.type} · ${item.gender} · ${styles}</div>
          </div>
          <span class="list-item-badge ${item.onSale?'badge-on':'badge-off'}">${item.onSale?'판매중':'종료'}</span>
        </div>`;
      }).join('')
    : '<div style="padding:28px;text-align:center;color:var(--text-muted);font-size:13px">검색 결과 없음</div>';
}

function filterList(v) { searchQuery = v; renderList(); }
function selectItem(id) { selectedId = id; renderList(); renderForm(ITEMS.find(i=>i.id===id)); }

// ─── 새 의장 ────────────────────────────────────────
function createNew() {
  const item = {
    id: getNextId(ITEMS),
    iconPath: '', imagePaths: [],
    name: '새 의장', type: '의상', gender: '공용', race: '인간',
    style: [], season: '상시',
    defense: 0, prot: 0, dur: 100, durMax: 100,
    colorParts: [],
    canEnchant: false, canUpgrade: false, canGem: false,
    enchants: [], setInfo: '',
    price: 0, priceMin: 0, priceMax: 0,
    priceDate: new Date().toISOString().slice(0,10),
    onSale: false, saleHistory: []
  };
  ITEMS.push(item);
  saveItems(ITEMS);
  selectedId = item.id;
  renderList();
  renderForm(item);
  showToast('새 의장이 추가되었습니다.', 'success');
}

// ─── 폼 렌더링 ──────────────────────────────────────
function renderForm(item) {
  if (!item) return;
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('formArea').style.display = 'block';

  const typeOpts = ['의상','모자/가발','신발','뷰티 쿠폰','얼굴 장식 슬롯','무기/악기 외형','스킬 이펙트','정령 현상 변환','로브','날개','서포트 퍼핏/헤일로','꼬리','스타더스트','제스처 카드/액션','의자','펫','대미지']
    .map(t=>`<option ${item.type===t?'selected':''}>${t}</option>`).join('');
  const gOpts = ['공용','여성','남성'].map(g=>`<option ${item.gender===g?'selected':''}>${g}</option>`).join('');
  const rOpts = ['인간','엘프','자이언트'].map(r=>`<option ${item.race===r?'selected':''}>${r}</option>`).join('');

  // 색상 파트

  const colorRows = (item.colorParts||[]).map((p,i) => renderColorRow(p,i)).join('');

  document.getElementById('formArea').innerHTML = `
  <div class="form-header">
    <div>

      </button>
      <button class="btn primary" onclick="saveForm(${item.id})">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>저장
      </button>
    </div>
  </div>

  <!-- 기본 정보 -->
  <div class="section">
    <div class="section-title">기본 정보</div>
    <div class="grid-3">
      <div class="field col-full">
        <label>의장명</label>
        <input type="text" id="f_name" value="${escHtml(item.name)}" placeholder="의장 이름 입력"/>
      </div>
      <div class="field"><label>종류</label><select id="f_type">${typeOpts}</select></div>
      <div class="field"><label>성별</label><select id="f_gender">${gOpts}</select></div>
      <div class="field"><label>종족</label><select id="f_race">${rOpts}</select></div>
      <div class="field">
        <label>시즌</label>
        <select id="f_season">
          <option ${item.season==='상시'?'selected':''}>상시</option>
          <option ${item.season==='기간한정'?'selected':''}>기간한정</option>
        </select>
      </div>
    </div>
    <div class="check-group" style="margin-top:10px">
      <label class="check-item">
        <input type="checkbox" id="f_onSale" ${item.onSale?'checked':''}/>
        <label for="f_onSale">현재 판매중</label>
      </label>
    </div>
  </div>

  <!-- 스타일 (다중 선택) -->
  <div class="section">
    <div class="section-title" style="color:var(--pink)">
      <span style="width:3px;height:11px;border-radius:2px;background:var(--pink);display:block"></span>
      스타일 <span style="font-size:10px;font-weight:400;color:var(--text-muted);margin-left:6px">복수 선택 가능</span>
    </div>
    <div class="style-picker" id="stylePicker">${styleChips}</div>
    <div class="style-add-row">
      <input type="text" id="newStyleInput" placeholder="새 스타일 유형 입력 (예: 화려한)" onkeydown="if(event.key==='Enter')addNewStyle()"/>
      <button class="btn sm purple" onclick="addNewStyle()">+ 추가</button>
    </div>
  </div>

  <!-- 이미지 -->
  <div class="section">
    <div class="section-title">이미지</div>
    <div class="img-upload-area">
      <div class="img-main-box">
        <div style="font-size:11px;font-weight:700;color:var(--text-muted);margin-bottom:5px">아이콘 (목록 썸네일)</div>
        <div class="img-preview" id="iconPreviewBox">
          ${iconPreview}
          <div class="img-preview-btn" onclick="document.getElementById('iconPathInput').focus()">경로 수정</div>
        </div>
        <input type="text" class="img-path-input" id="iconPathInput"
          value="${escHtml(item.iconPath||'')}"
          placeholder="images/icon_001.png"
          oninput="previewIcon(this.value)"/>
        <div class="img-path-hint">이미지 파일을 같은 폴더의 images/ 에 넣고 경로를 입력하세요.</div>
      </div>
      <div class="img-extra-list" style="flex:1">
        <div style="font-size:11px;font-weight:700;color:var(--text-muted);margin-bottom:5px">추가 이미지</div>
        <div class="dyn-list" id="extraImgList">${extraImgRows}</div>
        <button class="dyn-add" onclick="addExtraImg()">+ 이미지 경로 추가</button>

  <!-- 스탯 -->

    <div class="section-title">스탯 정보</div>

      <div class="field"><label>보호</label><input type="number" id="f_prot" value="${item.prot}" min="0"/></div>
      <div class="field"><label>내구도</label><input type="number" id="f_dur" value="${item.dur}" min="0"/></div>
      <div class="field"><label>최대 내구도</label><input type="number" id="f_durMax" value="${item.durMax}" min="0"/></div>
    </div>

  <!-- 색상 파트 -->
  <div class="section">
    <div class="section-title green">
      색상 파트
      <span class="color-total" id="colorTotal">총 ${totalColorCount}개</span>
    </div>
    <div class="dyn-header color-h">
      <div class="dyn-col">파트 이름</div>
      <div class="dyn-col">색상 수</div>
      <div></div>
    </div>
    <div class="dyn-list" id="colorList">${colorRows}</div>
    <button class="dyn-add" onclick="addColorPart()">+ 색상 파트 추가</button>

  <!-- 인챈트/개조/세공 가능 여부 -->

    <div class="section-title purple">인챈트 · 개조 · 세공</div>
    <div class="check-group" style="margin-bottom:14px">
      <label class="check-item">
        <input type="checkbox" id="f_canEnchant" ${item.canEnchant?'checked':''}/>
        <label for="f_canEnchant">인챈트 가능</label>
      </label>
      <label class="check-item">
        <input type="checkbox" id="f_canUpgrade" ${item.canUpgrade?'checked':''}/>
        <label for="f_canUpgrade">개조 가능</label>
      </label>
      <label class="check-item">
        <input type="checkbox" id="f_canGem" ${item.canGem?'checked':''}/>
        <label for="f_canGem">세공 가능</label>
      </label>
    </div>
    <div class="dyn-header enchant-h">
      <div class="dyn-col">인챈트명</div>
      <div class="dyn-col">슬롯</div>
      <div class="dyn-col">효과</div>
      <div></div>
    </div>
    <div class="dyn-list" id="enchantList">${enchantRows}</div>
    <button class="dyn-add" onclick="addEnchant()">+ 인챈트 추가</button>
  </div>

  <!-- 세트 아이템 -->
  <div class="section">
    <div class="section-title yellow">세트 아이템 정보</div>
    <div class="field">
      <label>세트 구성 및 효과 설명</label>
      <textarea id="f_setInfo" placeholder="예) 팔라딘 세트 3종 착용 시 방어력 +10, 보호 +3&#10;세트 구성: 흉갑 / 하의 / 장갑">${escHtml(item.setInfo||'')}</textarea>
    </div>
  </div>

  <!-- 경매장 시세 -->
  <div class="section">
    <div class="section-title">경매장 시세</div>
    <div class="grid-4">
      <div class="field"><label>현재 시세 (G)</label><input type="number" id="f_price" value="${item.price}" min="0"/></div>
      <div class="field"><label>최저 시세 (G)</label><input type="number" id="f_priceMin" value="${item.priceMin}" min="0"/></div>
      <div class="field"><label>최고 시세 (G)</label><input type="number" id="f_priceMax" value="${item.priceMax}" min="0"/></div>
      <div class="field"><label>기준일</label><input type="date" id="f_priceDate" value="${item.priceDate}"/></div>
    </div>
  </div>

  <!-- 판매 이력 -->
  <div class="section">
    <div class="section-title blue">판매 이력</div>
    <div class="dyn-header sale-h">
      <div class="dyn-col">시작일</div>
      <div class="dyn-col">종료일</div>
      <div class="dyn-col">기간(일)</div>
      <div class="dyn-col">판매 채널</div>
      <div class="dyn-col">비고</div>
      <div></div>
    </div>
    <div class="dyn-list" id="saleList">${saleRows}</div>
    <button class="dyn-add" onclick="addSaleHistory()">+ 판매 이력 추가</button>
  </div>
  `;
}

// ─── 렌더 헬퍼 ──────────────────────────────────────
function renderColorRow(p, i) {
  return `<div class="dyn-row color-r" id="color_${i}">
    <input type="text" placeholder="파트 이름 (예: 상의 메인)" value="${escHtml(p.name)}"
      oninput="updateColorPart(${i},'name',this.value)"/>
    <input type="number" placeholder="색상 수" value="${p.colorCount}" min="0"
      oninput="updateColorPart(${i},'colorCount',+this.value);refreshColorTotal()"/>
    <button class="del-btn" onclick="delColorPart(${i})">✕</button>
  </div>`;
}

function renderEnchantRow(e, i) {
  return `<div class="dyn-row enchant-r" id="enchant_${i}">
    <input type="text" placeholder="인챈트명" value="${escHtml(e.name)}"
      oninput="updateEnchant(${i},'name',this.value)"/>
    <select onchange="updateEnchant(${i},'slot',this.value)">
      <option ${e.slot==='접두'?'selected':''}>접두</option>
      <option ${e.slot==='접미'?'selected':''}>접미</option>
    </select>
    <input type="text" placeholder="효과 설명" value="${escHtml(e.effect)}"
      oninput="updateEnchant(${i},'effect',this.value)"/>
    <button class="del-btn" onclick="delEnchant(${i})">✕</button>
  </div>`;
}

function renderSaleRow(r, i) {
  const chOpts = ['캐시샵','이벤트','패키지'].map(c=>`<option ${r.channel===c?'selected':''}>${c}</option>`).join('');
  return `<div class="dyn-row sale-r" id="sale_${i}">
    <input type="date" value="${r.startDate}"
      onchange="updateSale(${i},'startDate',this.value);autoCalcDays(${i})"/>
    <input type="date" value="${r.endDate}"
      onchange="updateSale(${i},'endDate',this.value);autoCalcDays(${i})"/>
    <input type="number" id="sale_days_${i}" value="${r.durationDays}" min="1"
      oninput="updateSale(${i},'durationDays',+this.value)"/>
    <select onchange="updateSale(${i},'channel',this.value)">${chOpts}</select>
    <input type="text" placeholder="비고" value="${escHtml(r.note||'')}"
      oninput="updateSale(${i},'note',this.value)"/>
    <button class="del-btn" onclick="delSaleHistory(${i})">✕</button>
  </div>`;
}

function renderExtraImgRow(p, i) {
  return `<div class="img-extra-row" id="extraImg_${i}">
    <div class="img-extra-thumb">
      ${p ? `<img src="${escHtml(p)}" onerror="this.style.display='none'">` : ''}
    </div>
    <input type="text" placeholder="images/item_001_a.png" value="${escHtml(p)}"
      oninput="updateExtraImg(${i},this.value);refreshExtraThumb(${i},this.value)"/>
    <button class="del-btn" onclick="delExtraImg(${i})">✕</button>
  </div>`;
}

// ─── 스타일 다중 선택 ────────────────────────────────
function toggleStyle(style, el) {
  const item = ITEMS.find(i=>i.id===selectedId);
  if (!item) return;
  item.style = item.style||[];
  const idx = item.style.indexOf(style);
  if (idx >= 0) { item.style.splice(idx,1); el.classList.remove('selected'); }
  else { item.style.push(style); el.classList.add('selected'); }
}

function addNewStyle() {
  const input = document.getElementById('newStyleInput');
  const val = input.value.trim();
  if (!val) return;
  if (STYLES.includes(val)) { showToast('이미 존재하는 스타일입니다.', 'error'); return; }
  STYLES.push(val);
  saveStyles(STYLES);
  input.value = '';
  // 칩 추가
  const picker = document.getElementById('stylePicker');
  const chip = document.createElement('button');
  chip.type = 'button';
  chip.className = 'style-chip';
  chip.textContent = val;
  chip.onclick = function() { toggleStyle(val, this); };
  picker.appendChild(chip);
  showToast(`"${val}" 스타일이 추가되었습니다.`, 'success');
}

// ─── 이미지 미리보기 ────────────────────────────────
function previewIcon(path) {
  const item = ITEMS.find(i=>i.id===selectedId);
  if (item) item.iconPath = path;
  const box = document.getElementById('iconPreviewBox');
  if (!box) return;
  if (path) {
    box.innerHTML = `<img src="${escHtml(path)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <span class="img-preview-placeholder" style="display:none">${(item?.name||'?')[0]}</span>
      <div class="img-preview-btn" onclick="document.getElementById('iconPathInput').focus()">경로 수정</div>`;
  } else {
    box.innerHTML = `<span class="img-preview-placeholder">${(item?.name||'?')[0]}</span>
      <div class="img-preview-btn" onclick="document.getElementById('iconPathInput').focus()">경로 입력</div>`;
  }
}

function refreshExtraThumb(i, path) {
  const row = document.getElementById('extraImg_'+i);
  if (!row) return;
  const thumb = row.querySelector('.img-extra-thumb');
  if (!thumb) return;
  thumb.innerHTML = path ? `<img src="${escHtml(path)}" onerror="this.style.display='none'">` : '';
}

// ─── 색상 파트 ───────────────────────────────────────
function addColorPart() {
  const item = ITEMS.find(i=>i.id===selectedId);
  if (!item) return;
  item.colorParts = item.colorParts||[];
  item.colorParts.push({name:'',colorCount:1});
  const list = document.getElementById('colorList');
  const idx = item.colorParts.length - 1;
  const div = document.createElement('div');
  div.innerHTML = renderColorRow(item.colorParts[idx], idx);
  list.appendChild(div.firstElementChild);
  refreshColorTotal();
}
function updateColorPart(i,k,v) {
  const item=ITEMS.find(x=>x.id===selectedId);
  if(item&&item.colorParts[i]) item.colorParts[i][k]=v;
}
function delColorPart(i) {
  const item=ITEMS.find(x=>x.id===selectedId);
  if(!item) return;
  item.colorParts.splice(i,1);
  renderForm(item);
}
function refreshColorTotal() {
  const item=ITEMS.find(x=>x.id===selectedId);
  if(!item) return;
  const total=(item.colorParts||[]).reduce((s,p)=>s+(+p.colorCount||0),0);
  const el=document.getElementById('colorTotal');
  if(el) el.textContent='총 '+total+'개';
}

// ─── 인챈트 ─────────────────────────────────────────
function addEnchant() {
  const item=ITEMS.find(i=>i.id===selectedId);
  if(!item) return;
  item.enchants=item.enchants||[];
  item.enchants.push({name:'',slot:'접두',effect:''});
  const list=document.getElementById('enchantList');
  const idx=item.enchants.length-1;
  const div=document.createElement('div');
  div.innerHTML=renderEnchantRow(item.enchants[idx],idx);
  list.appendChild(div.firstElementChild);
}
function updateEnchant(i,k,v){const item=ITEMS.find(x=>x.id===selectedId);if(item&&item.enchants[i])item.enchants[i][k]=v;}
function delEnchant(i){const item=ITEMS.find(x=>x.id===selectedId);if(!item)return;item.enchants.splice(i,1);renderForm(item);}

// ─── 판매 이력 ───────────────────────────────────────
function addSaleHistory() {
  const item=ITEMS.find(i=>i.id===selectedId);
  if(!item) return;
  item.saleHistory=item.saleHistory||[];
  const nth=item.saleHistory.length>0?Math.max(...item.saleHistory.map(r=>r.nth))+1:1;
  item.saleHistory.push({nth,startDate:'',endDate:'',durationDays:14,channel:'캐시샵',note:''});
  const sorted=[...item.saleHistory].sort((a,b)=>b.nth-a.nth);
  const i=0; // 새 항목은 정렬 후 맨 위
  const list=document.getElementById('saleList');
  const div=document.createElement('div');
  div.innerHTML=renderSaleRow(sorted[i],i);
  list.insertBefore(div.firstElementChild,list.firstChild);
}
function getSortedSale(){const item=ITEMS.find(x=>x.id===selectedId);return item?[...item.saleHistory].sort((a,b)=>b.nth-a.nth):[];}
function updateSale(i,k,v){const sorted=getSortedSale();if(sorted[i])sorted[i][k]=v;}
function delSaleHistory(i){
  const item=ITEMS.find(x=>x.id===selectedId);
  if(!item)return;
  const sorted=[...item.saleHistory].sort((a,b)=>b.nth-a.nth);
  sorted.splice(i,1);
  sorted.sort((a,b)=>new Date(a.startDate)-new Date(b.startDate)).forEach((r,idx)=>r.nth=idx+1);
  item.saleHistory=sorted;
  renderForm(item);
}
function autoCalcDays(i){
  const sorted=getSortedSale();
  const r=sorted[i];
  if(r&&r.startDate&&r.endDate){
    const diff=Math.round((new Date(r.endDate)-new Date(r.startDate))/(1000*60*60*24));
    if(diff>0){r.durationDays=diff;const el=document.getElementById('sale_days_'+i);if(el)el.value=diff;}
  }
}

// ─── 추가 이미지 ────────────────────────────────────
function addExtraImg(){
  const item=ITEMS.find(i=>i.id===selectedId);
  if(!item)return;
  item.imagePaths=item.imagePaths||[];
  item.imagePaths.push('');
  const list=document.getElementById('extraImgList');
  const idx=item.imagePaths.length-1;
  const div=document.createElement('div');
  div.innerHTML=renderExtraImgRow('',idx);
  list.appendChild(div.firstElementChild);
}
function updateExtraImg(i,v){const item=ITEMS.find(x=>x.id===selectedId);if(item&&item.imagePaths)item.imagePaths[i]=v;}
function delExtraImg(i){
  const item=ITEMS.find(x=>x.id===selectedId);
  if(!item)return;
  item.imagePaths.splice(i,1);
  renderForm(item);
}

// ─── 저장 ────────────────────────────────────────────
function saveForm(id) {
  const item = ITEMS.find(i=>i.id===id);
  if (!item) return;
  item.name      = document.getElementById('f_name').value.trim()||'(이름 없음)';
  item.type      = document.getElementById('f_type').value;
  item.gender    = document.getElementById('f_gender').value;
  item.race      = document.getElementById('f_race').value;
  item.season    = document.getElementById('f_season').value;
  item.onSale    = document.getElementById('f_onSale').checked;
  item.defense   = +document.getElementById('f_defense').value||0;
  item.prot      = +document.getElementById('f_prot').value||0;
  item.dur       = +document.getElementById('f_dur').value||0;
  item.durMax    = +document.getElementById('f_durMax').value||0;
  item.canEnchant= document.getElementById('f_canEnchant').checked;
  item.canUpgrade= document.getElementById('f_canUpgrade').checked;
  item.canGem    = document.getElementById('f_canGem').checked;
  item.setInfo   = document.getElementById('f_setInfo').value;
  item.price     = +document.getElementById('f_price').value||0;
  item.priceMin  = +document.getElementById('f_priceMin').value||0;
  item.priceMax  = +document.getElementById('f_priceMax').value||0;
  item.priceDate = document.getElementById('f_priceDate').value;
  item.iconPath  = document.getElementById('iconPathInput').value.trim();
  // style은 toggleStyle에서 실시간 반영
  saveItems(ITEMS);
  renderList();
  showToast(`"${item.name}" 저장 완료!`, 'success');
}

// ─── 삭제 ────────────────────────────────────────────
function confirmDelete(id) {
  const item = ITEMS.find(i=>i.id===id);
  if (!item) return;
  showConfirm('의장 삭제', `"${item.name}"을(를) 삭제하시겠습니까?<br>이 작업은 되돌릴 수 없습니다.`, ()=>deleteItem(id));
}
function deleteItem(id) {
  ITEMS = ITEMS.filter(i=>i.id!==id);
  saveItems(ITEMS);
  selectedId = null;
  document.getElementById('emptyState').style.display = '';
  document.getElementById('formArea').style.display = 'none';
  renderList();
  hideConfirm();
  showToast('삭제되었습니다.', 'success');
}

// ─── JSON 내보내기/가져오기 ──────────────────────────
function exportJSON() {
  const blob = new Blob([JSON.stringify(ITEMS,null,2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'mabinogi_dress_data.json';
  a.click();
  showToast('JSON 내보내기 완료', 'success');
}
function handleImport(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!Array.isArray(data)) throw new Error('배열 형식이 아닙니다');
      showConfirm('JSON 가져오기', `총 <strong>${data.length}개</strong> 의장 데이터를 가져옵니다.<br>현재 데이터는 덮어씌워집니다.`, ()=>{
        ITEMS = data;
        saveItems(ITEMS);
        selectedId = null;
        document.getElementById('emptyState').style.display='';
        document.getElementById('formArea').style.display='none';
        renderList();
        hideConfirm();
        showToast(`${data.length}개 데이터 가져오기 완료`, 'success');
      });
    } catch(err) { showToast('파싱 오류: '+err.message, 'error'); }
  };
  reader.readAsText(file);
  input.value = '';
}
function confirmReset() {
  showConfirm('기본값으로 초기화', '모든 데이터가 <strong>초기 샘플 데이터</strong>로 되돌아갑니다.<br>현재 저장된 데이터는 사라집니다.', ()=>{
    localStorage.removeItem('mabinogi_dress_items');
    ITEMS = loadItems();
    saveItems(ITEMS);
    selectedId = null;
    document.getElementById('emptyState').style.display='';
    document.getElementById('formArea').style.display='none';
    renderList();
    hideConfirm();
    showToast('기본 데이터로 초기화했습니다.', 'success');
  });
}

// ─── CONFIRM 유틸 ────────────────────────────────────
function showConfirm(title, msg, onOk) {
  document.getElementById('confirmTitle').textContent = title;
  document.getElementById('confirmMsg').innerHTML = msg;
  document.getElementById('confirmOk').onclick = onOk;
  document.getElementById('confirmOverlay').classList.add('open');
}
function hideConfirm() { document.getElementById('confirmOverlay').classList.remove('open'); }
document.getElementById('confirmOverlay').addEventListener('click', e=>{
  if(e.target===document.getElementById('confirmOverlay')) hideConfirm();
});

// ─── TOAST ───────────────────────────────────────────
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type?' '+type:'');
  setTimeout(()=>{ t.className='toast'; }, 2600);
}

// ─── 유틸 ────────────────────────────────────────────
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─── 초기화 ──────────────────────────────────────────
renderList();
</script>
